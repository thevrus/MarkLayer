<!doctype html>
<html lang="en" data-marklayer="1">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkLayer — Free Webpage Annotation Tool for Chrome</title>
    <meta
      name="description"
      content="Annotate any webpage with drawings, comments, arrows, and highlights. Share a link for instant visual feedback — no account needed. Free Chrome extension."
    />
    <meta
      property="og:title"
      content="MarkLayer — Free Webpage Annotation Tool for Chrome"
    />
    <meta
      property="og:description"
      content="Draw, comment, and mark up any live website. Share a link so anyone can see your annotations instantly. No sign-up required."
    />
    <meta property="og:image" content="https://marklayer.app/og.jpg" />
    <meta property="og:url" content="https://marklayer.app" />
    <meta property="og:site_name" content="MarkLayer" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://marklayer.app/og.jpg" />
    <meta
      name="twitter:title"
      content="MarkLayer — Annotate Any Webpage & Share Instantly"
    />
    <meta
      name="twitter:description"
      content="Free Chrome extension for visual feedback on websites. Draw, comment, collaborate in real time. No account needed."
    />
    <link rel="canonical" href="https://marklayer.app/" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MarkLayer",
        "description": "Free Chrome extension to annotate any webpage with drawings, comments, and arrows. Share a link for instant visual feedback.",
        "applicationCategory": "BrowserApplication",
        "operatingSystem": "Chrome",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "url": "https://marklayer.app",
        "downloadUrl": "https://chromewebstore.google.com/detail/marklayer/fnfobegjifomgobgilaemihpcpidjamc"
      }
    </script>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Imbue:opsz,wght@10..100,100..900&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (() => {
        var t = localStorage.getItem("ml-theme");
        if (t === "dark" || t === "light")
          document.documentElement.classList.add(t);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/web/main.tsx"></script>
  </body>
</html>
